  <body>
    <!-- Progress + controls are injected by ui/progress.js -->

    <!-- The whole story is mounted here by main.js. Each frame is a <section>. -->
    <main id="story" aria-label="One Bird's Story. Toronto's Future."></main>

    <noscript>
      <div class="noscript">
        <h1>One Bird's Story. Toronto's Future.</h1>
        <p>
          This is an animated story about Willow, a Tree Swallow who flies thousands of
          kilometres each spring to spend her summer in Toronto. As the climate warms, spring
          arrives before she does - flowers bloom and insects emerge earlier, while her chicks
          hatch on the old schedule. Scientists call this <em>phenological mismatch</em>: nature's
          timing is no longer synchronized. Willow's story is shared by many of Toronto's
          migratory birds. Please enable JavaScript to experience the full animated story.
        </p>
      </div>
    </noscript>

    <script type="module" src="/src/main.js"></script>
  </body>
</html>
